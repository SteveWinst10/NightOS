    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Night OS</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
        <style>
          
            *{
                padding: 0;
                margin: 0;
                box-sizing: border-box;
                color: white;
                font-family: "Google Sans";
            }
            body{
                background-image: url("nightWP.jpg");
                background-color: black;
                background-repeat: no-repeat;
                background-size: cover;
                overflow: hidden;
            }
            #taskbar{
                background-color : rgba(32, 34, 36, 0.2);
                width: max-content;
                padding: 0 3%;
                height: 7%;
    
                position: absolute;
                bottom: 20px;
                left: 0;
                right: 0;
                margin-left: auto;
                margin-right: auto;
    
                backdrop-filter: blur(10px) ;
    
                border: 3px solid rgba(231,231,231,0.2);
                border-radius: 15px;
                
                
            }
            .icon{
                height: 100%;
                width: 100%;
            }
            .icon img{
                height: 100%;
                width: 100%;
                object-fit: contain;
            }
            .icon-container{
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 20px;
                height: 100%;
                width: 100%;
            }
            .window{
                background-color: rgba(0,0,0,0.5) ;
                height: 400px;
                width: 500px;

                margin-left: auto;
                margin-right: auto;
                margin-top: 10%;

                backdrop-filter: blur(10px);

                border: 3px solid rgba(255,255,255,0.5) ;
                border-radius: 15px;
                
                
                display: flex;
                overflow: hidden;
            }
            .sidebar{
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                width: 160px;       
                padding-right: 15px;
                padding-top: 15px;
                padding-left: 15px;
                gap: 15px;
             
            }
            .settings-item{
                padding: 10px 12px;
                width: 100%;
                border: 2px solid aliceblue;
                border-radius: 5px;
                background-color: rgba(100,100,100,0.11);
            }
            .setting-active{
                background-color: rgba(255,255,255,1) !important;
            }
            .settings-item:hover{
                background-color: rgba(211,211,211,0.2);
                cursor: pointer;
            }
            .setting-active p{
                color: black
            }
            .separator{
                margin-left: 0;
                width: 2px;
                height: 100%;
                background-color: aliceblue;
            }
           
        </style>
    </head>
    <body>
    <main>
        <div class="window" id="settings">
            <div class="sidebar">
                <div class="settings-item " id="color-settings">
                    <p>Windows</p>
                </div>
                <div class="settings-item setting-active " >
                    <p>Taskbar</p>
                </div>
                <div class="settings-item " >
                    <p>Wallpaper</p>
                </div>
                <div class="settings-item " >
                    <p>Theme</p>
                </div>
            </div>
            <div class="separator "></div>

            <div class="content">
            </div>
        </div>
    </main>
    <footer>
        <div id="taskbar" >
                <div class="icon-container">
                    <div class="icon">
                        <!-- "Setting icons created by gungyoga04 - Flaticon" -->
                        <img src="icons/setting.jpg" alt="settings">
                    </div>
                    <div class="icon">
                        <!--TODO: add info icon -->
                        <img src="icons/setting.jpg" alt="settings">
                    </div>
                    <div class="icon">
                        <img src="icons/setting.jpg" alt="settings">
                    </div>
                </div>
        </div>
    </footer>
    </body>
    </html>
