<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Night OS</title>

    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            background-image: url("nightWP.jpg");
            background-color: black;
            background-repeat: no-repeat;
            background-size: cover;
            overflow: hidden;
        }
        #taskbar{
            background-color : rgba(32, 34, 36, 0.2);
            width: max-content;
            padding: 0 3%;
            height: 7%;

            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            margin-left: auto;
            margin-right: auto;

            backdrop-filter: blur(10px) ;

            border: 3px solid rgba(231,231,231,0.2);
            border-radius: 15px;

        }
        .icon{
            height: 100%;
            width: 100%;
        }
        .icon img{
            height: 100%;
            width: 100%;
            object-fit: contain;
        }

        .icon-container{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>
<footer>
    <div id="taskbar">
            <div class="icon-container">
                <div class="icon">
                    <!-- "Setting icons created by gungyoga04 - Flaticon" -->
                    <img src="setting.png" alt="settings">
                </div>
                <div class="icon">
                    <!-- "Setting icons created by gungyoga04 - Flaticon" -->
                    <img src="setting.png" alt="settings">
                </div>
                <div class="icon">
                    <!-- "Setting icons created by gungyoga04 - Flaticon" -->
                    <img src="setting.png" alt="settings">
                </div>
            </div>
    </div>
</footer>
</body>
</html>
