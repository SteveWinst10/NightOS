<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Night OS</title>

    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            background-image: url("nightWP.jpg");
            background-color: black;
            background-repeat: no-repeat;
            background-size: cover;
            overflow: hidden;
        }
        #taskbar{
            background-color : rgba(32, 34, 36, 0.2);
            width: max-content;
            padding: 0 3%;
            height: 7%;

            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            margin-left: auto;
            margin-right: auto;

            opacity: 20%;
            backdrop-filter: blur(100px) ;

            border: 5px solid rgb(241,241,241);
            border-radius: 30px;
        }

    </style>
</head>
<body>
<footer>
    <div id="taskbar">

    </div>
</footer>
</body>
</html>
