    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Night OS</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
    <header class="glass shadow">
        <div id="clock"></div>
    </header>
    <main>
        <div class="window shadow" id="settings">
            <div class="sidebar">
                <div class="settings-sidebar-option shadow" id="color-settings">
                    <p>Windows</p>
                </div>
                <div class="settings-sidebar-option setting-sidebar-active shadow" >
                    <p>Taskbar</p>
                </div>
                <div class="settings-sidebar-option shadow" >
                    <p>Wallpaper</p>
                </div>
                <div class="settings-sidebar-option shadow" >
                    <p>Theme</p>
                </div>
            </div>
            <div class="separator shadow"></div>
            <div class="content" id="windows-content">

            </div>
            <div class="content" id="taskbar-content">
                <h3 class="setting-heading">Taskbar Behaviour :</h3>
                <div class="setting-item">
                    <form id="taskbar-options">
                        <label class="checkbox-label"> Automatically hide taskbar
                                <input type="checkbox" id="autoHide" name="hide" value="true">
                        </label>
                        <label class="checkbox-label">Taskbar alignment
                            <select id="taskbarAlignment" class="dropdown glass" name="alignment">
                                <option value="left">Left</option>
                                <option value="center">Center</option>
                                <option value="right">Right</option>
                            </select>
                            
                        </label>
                    </form>
                </div>
            </div>
            <div class="content" id="wallpaper-content">

            </div>
            <div class="content" id="theme-content">

            </div>
        </div>
    </main>
    <footer>
        <div id="taskbar" class="shadow">
                <div class="icon-container">
                    <div class="icon">
                        <!-- "Setting icons created by gungyoga04 - Flaticon" -->
                        <img src="icons/setting.jpg" alt="settings" draggable="false">
                    </div>
                    <div class="icon">
                        <!--TODO: add info icon -->
                        <img src="icons/setting.jpg" alt="settings" draggable="false">
                    </div>
                    <div class="icon">
                        <img src="icons/setting.jpg" alt="settings" draggable="false">
                    </div>
                </div>
        </div>
    </footer>
    <script src="script.js"></script>
    </body>
    </html>
